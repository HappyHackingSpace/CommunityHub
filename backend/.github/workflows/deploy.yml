name: Deploy to AWS ECS

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  EC2_HOST: ${{ secrets.EC2_HOST }}
  EC2_USER: ${{ secrets.EC2_USER }}

permissions:
  contents: read
  id-token: write

jobs:
  test:
    name: Test Application
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: communityhub_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Run tests
      run: npm run test
      env:
        DB_HOST: localhost
        DB_PORT: 5432
        DB_USERNAME: postgres
        DB_PASSWORD: password
        DB_DATABASE: communityhub_test
        JWT_SECRET: test-secret

    - name: Build application
      run: npm run build

  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Deploy to EC2 via SSH
      uses: appleboy/ssh-action@v1.1.0
      with:
        host: ${{ env.EC2_HOST }}
        username: ${{ env.EC2_USER }}
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          cd ~/communityhub-backend
          
          # Pull latest code
          git pull origin main
          
          # Create/update .env file
          cat > .env << 'EOL'
          NODE_ENV=production
          DB_HOST=postgres
          DB_PORT=5432
          DB_USERNAME=postgres
          DB_PASSWORD=password
          DB_DATABASE=communityhub
          JWT_SECRET=${{ secrets.JWT_SECRET }}
          GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }}
          FRONTEND_URL=http://${{ env.EC2_HOST }}:3001
          EOL
          
          # Restart Docker services
          docker-compose down
          docker-compose up --build -d
          
          # Wait for services to be ready
          sleep 30
          
          # Check if application is running
          curl -f http://localhost:3000/meetings || echo "Health check failed but continuing..."

  notify:
    name: Notify Deployment
    runs-on: ubuntu-latest
    needs: [test, deploy]
    if: always()

    steps:
    - name: Notify Success
      if: needs.deploy.result == 'success'
      run: |
        echo "🚀 Deployment successful!"
        echo "Application URL: http://${{ secrets.EC2_HOST }}:3000"

    - name: Notify Failure
      if: needs.deploy.result == 'failure'
      run: |
        echo "❌ Deployment failed!"
        exit 1